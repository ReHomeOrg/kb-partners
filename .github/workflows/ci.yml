name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # ============================================================
  # OpenAPI spec validation (Redocly)
  # ============================================================
  openapi:
    name: OpenAPI spec validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint production OpenAPI (if exists)
        run: |
          if [ -f docs/openapi.yaml ]; then
            npx -y @redocly/cli@latest lint docs/openapi.yaml
          else
            echo "docs/openapi.yaml ещё не создан. Skipping."
          fi

  # ============================================================
  # AT-001 — архитектурная константа
  # Запрещены: импорты из rehome-kb-platform / kb-support и прямые SQL
  # к чужим таблицам. См. CLAUDE.md правило 7 и ADR-0001.
  # ============================================================
  arch-constraint:
    name: Architectural constraint (AT-001)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run check-arch-constraint.sh
        run: bash scripts/check-arch-constraint.sh
      - name: Run self-tests (fixtures)
        run: bash tests/arch-constraint/test_runner.sh

  # ============================================================
  # Anti-crutches: TODO/FIXME/HACK без тикета в коде
  # ============================================================
  anti-crutches:
    name: Anti-crutches checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TODO without ticket reference
        run: |
          if find backend frontend -type f \( -name '*.py' -o -name '*.ts' -o -name '*.tsx' -o -name '*.js' \) 2>/dev/null | \
             xargs grep -EnH '(TODO|FIXME|HACK)([^#]|$)' 2>/dev/null | \
             grep -vE '(#[0-9]+|TD-[A-Z]+-[0-9]+)' | head -20; then
            echo "::warning::Найдены TODO/FIXME/HACK без ссылки на тикет (#N или TD-XXX)"
          else
            echo "✓ Anti-crutches clean"
          fi

  # ============================================================
  # Backend (Python): lint + type + tests
  # ============================================================
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kbpartners
          POSTGRES_USER: kbpartners
          POSTGRES_PASSWORD: devpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kbpartners -d kbpartners"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      KBP_DATABASE_URL: postgresql+asyncpg://kbpartners:devpass@localhost:5432/kbpartners
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Check if backend exists
        id: check
        run: |
          if [ -d backend ] && [ -f backend/pyproject.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Ruff lint + format check
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy strict
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: mypy --strict src tests

      - name: Alembic upgrade head
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: alembic upgrade head

      - name: Pytest + coverage
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: pytest --cov=src --cov-fail-under=80

      - name: Contract tests (AT-002)
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: pytest tests/contract/ -v

  # ============================================================
  # Frontend (Next.js): lint + type + tests — активируется в M7 (портал LIGHT)
  # ============================================================
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if frontend exists
        id: check
        run: |
          if [ -d frontend ] && [ -f frontend/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "frontend/ ещё не создан (до M7). Skipping."
          fi
      - name: Setup Node
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci
      - name: Lint
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run lint
      - name: Type-check
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run typecheck
      - name: Tests
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm test -- --run
      - name: Build
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run build
